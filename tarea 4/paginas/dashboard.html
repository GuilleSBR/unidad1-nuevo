<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">Clínica (Demo)</div>
      <nav class="nav">
        <a href="./dashboard.html" data-nav="dashboard">Dashboard</a>
<a href="./pacientes.html" data-nav="pacientes">Control de pacientes</a>
<a href="./agenda.html" data-nav="agenda">Control de agenda</a>
<a href="./medicos.html" data-nav="medicos">Control de médicos</a>
<a href="./especialidades.html" data-nav="especialidades">Especialidades médicas</a>
<a href="./tarifas.html" data-nav="tarifas">Gestor de tarifas</a>
<a href="./pagos.html" data-nav="pagos">Pagos</a>
<a href="./reportes.html" data-nav="reportes">Reportes</a>
<a href="./bitacoras.html" data-nav="bitacoras">Bitácoras de usuarios</a>
      </nav>
      <div style="margin-top:12px;">
        <button class="btn" id="btnLogout">Cerrar sesión</button>
        <div class="small" id="whoami" style="margin-top:8px;"></div>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <h1>Dashboard</h1>
      </div>

      
<div class="card">
  <div class="grid">
    <div class="card">
      <div class="small">Pacientes</div>
      <div style="font-size:28px;font-weight:800" id="kpiPacientes">0</div>
    </div>
    <div class="card">
      <div class="small">Citas</div>
      <div style="font-size:28px;font-weight:800" id="kpiCitas">0</div>
    </div>
    <div class="card">
      <div class="small">Médicos</div>
      <div style="font-size:28px;font-weight:800" id="kpiMedicos">0</div>
    </div>
    <div class="card">
      <div class="small">Pagos (registrados)</div>
      <div style="font-size:28px;font-weight:800" id="kpiPagos">0</div>
    </div>
  </div>
</div>

<div class="card">
  <div style="font-weight:700;margin-bottom:8px;">Bitácora</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Fecha</th><th>Usuario</th><th>Módulo</th><th>Acción</th>
        </tr>
      </thead>
      <tbody id="tbBitacora">
        </tbody>
    </table>
  </div>
</div>

    </main>
  </div>

  <script src="../js/app.js"></script>
  <script>
    requireAuth();
    setActiveNav("dashboard");
    // Esqueleto: no mostramos información de sesión
    document.getElementById("whoami").textContent = "";
    document.getElementById("btnLogout").addEventListener("click", logout);
  </script>
  
<script>
  const pacientes = list(STORAGE.PACIENTES);
  const citas = list(STORAGE.CITAS);
  const medicos = list(STORAGE.MEDICOS);
  const pagos = list(STORAGE.PAGOS);
  document.getElementById("kpiPacientes").textContent = pacientes.length;
  document.getElementById("kpiCitas").textContent = citas.length;
  document.getElementById("kpiMedicos").textContent = medicos.length;
  document.getElementById("kpiPagos").textContent = pagos.length;

  const tb = document.getElementById("tbBitacora");
  // Esqueleto: bitácora vacía (sin registros)
  tb.innerHTML = "";
</script>

</body>
</html>
