<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reportes</title>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">Clínica (Demo)</div>
      <nav class="nav">
        <a href="./dashboard.html" data-nav="dashboard">Dashboard</a>
<a href="./pacientes.html" data-nav="pacientes">Control de pacientes</a>
<a href="./agenda.html" data-nav="agenda">Control de agenda</a>
<a href="./medicos.html" data-nav="medicos">Control de médicos</a>
<a href="./especialidades.html" data-nav="especialidades">Especialidades médicas</a>
<a href="./tarifas.html" data-nav="tarifas">Gestor de tarifas</a>
<a href="./pagos.html" data-nav="pagos">Pagos</a>
<a href="./reportes.html" data-nav="reportes">Reportes</a>
<a href="./bitacoras.html" data-nav="bitacoras">Bitácoras de usuarios</a>
      </nav>
      <div style="margin-top:12px;">
        <button class="btn" id="btnLogout">Cerrar sesión</button>
        <div class="small" id="whoami" style="margin-top:8px;"></div>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <h1>Reportes</h1>
      </div>

      
<div class="card">
  <div style="font-weight:700;margin-bottom:8px;">Generar reporte (demo)</div>
  <form id="frmRep">
    <div class="grid">
      <div class="field">
        <label>Tipo de reporte</label>
        <select id="r_tipo">
          <option>Médico</option>
          <option>Financiero</option>
          <option>Citas</option>
          <option>Pacientes</option>
        </select>
      </div>
      <div class="field">
        <label>Descripción</label>
        <input id="r_desc" placeholder="Opcional" />
      </div>
    </div>
    <div class="actions">
      <button class="btn primary" type="submit">Generar</button>
      <button class="btn" type="button" id="r_limpiar">Limpiar</button>
    </div>
    <div class="small" id="r_msg"></div>
  </form>
</div>

<div class="card">
  <div style="font-weight:700;margin-bottom:8px;">Reportes generados</div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Fecha</th><th>Tipo</th><th>Descripción</th><th>Generado por</th><th>Acciones</th></tr></thead>
      <tbody id="tbRep">
        </tbody>
    </table>
  </div>
</div>

    </main>
  </div>

  <script src="../js/app.js"></script>
  <script>
    requireAuth();
    setActiveNav("reportes");
    document.getElementById("whoami").textContent = "";
    document.getElementById("btnLogout").addEventListener("click", logout);
  </script>
  
<script>
  const $ = (id) => document.getElementById(id);
  const frm = $("frmRep");
  const tb = $("tbRep");
  const msg = $("r_msg");

  function limpiar(){
    frm.reset();
    msg.textContent = "";
  }

  function render(){
    const reps = list(STORAGE.REPORTES);
    tb.innerHTML = reps.map(r => `
      <tr>
        <td>${new Date(r.fechaGeneracion).toLocaleString()}</td>
        <td>${r.tipo}</td>
        <td>${r.descripcion || ""}</td>
        <td>${r.generadoPor}</td>
        <td>
          <button class="btn" onclick="verRep('${r.id}')">Ver</button>
          <button class="btn danger" onclick="delRep('${r.id}')">Eliminar</button>
        </td>
      </tr>
    `).join("") || `<tr><td colspan="5" class="small">Sin registros</td></tr>`;
  }

  window.verRep = (id) => {
    const r = byId(list(STORAGE.REPORTES), id);
    if (!r) return;
    alert("Reporte (demo)\n\nTipo: " + r.tipo + "\nFecha: " + new Date(r.fechaGeneracion).toLocaleString() + "\nDescripción: " + (r.descripcion||""));
  };

  window.delRep = (id) => {
    if (!confirm("¿Eliminar reporte?")) return;
    removeById(STORAGE.REPORTES, id);
    logAction("Eliminó reporte " + id, "Reportes");
    render();
  };

  frm.addEventListener("submit", (e) => {
    e.preventDefault();
    const s = getSession();
    const item = {
      id: uid("rep"),
      tipo: $("r_tipo").value,
      descripcion: $("r_desc").value.trim(),
      fechaGeneracion: nowISO(),
      generadoPor: s ? s.usuario : "N/A",
      rutaArchivo: null, // en un sistema real aquí iría la ruta del PDF/CSV
    };
    upsert(STORAGE.REPORTES, item);
    logAction("Generó reporte " + item.tipo, "Reportes");
    msg.textContent = "Reporte generado ✅ (solo demo)";
    limpiar();
    render();
  });

  $("r_limpiar").addEventListener("click", limpiar);

  render();
</script>

</body>
</html>
