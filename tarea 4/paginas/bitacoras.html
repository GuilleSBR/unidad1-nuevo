<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bitácoras de usuarios</title>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <nav class="nav">
        <a href="./dashboard.html" data-nav="dashboard">Dashboard</a>
<a href="./pacientes.html" data-nav="pacientes">Control de pacientes</a>
<a href="./agenda.html" data-nav="agenda">Control de agenda</a>
<a href="./medicos.html" data-nav="medicos">Control de médicos</a>
<a href="./especialidades.html" data-nav="especialidades">Especialidades médicas</a>
<a href="./tarifas.html" data-nav="tarifas">Gestor de tarifas</a>
<a href="./pagos.html" data-nav="pagos">Pagos</a>
<a href="./reportes.html" data-nav="reportes">Reportes</a>
<a href="./bitacoras.html" data-nav="bitacoras">Bitácoras de usuarios</a>
      </nav>
      <div style="margin-top:12px;">
        <button class="btn" id="btnLogout">Cerrar sesión</button>
        <div class="small" id="whoami" style="margin-top:8px;"></div>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <h1>Bitácoras de usuarios</h1>
      </div>

      
<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;">
    <div style="font-weight:700;">Bitácora de usuarios</div>
    <input id="qBit" placeholder="Buscar..." style="max-width:240px;padding:10px;border:1px solid var(--border);border-radius:10px;" />
  </div>

  <div class="table-wrap" style="margin-top:10px;">
    <table>
      <thead><tr><th>Fecha</th><th>Usuario</th><th>Módulo</th><th>Acción</th></tr></thead>
      <tbody id="tbBit">
        </tbody>
    </table>
  </div>
  <div class="actions" style="margin-top:10px;">
    <button class="btn danger" id="btnClearBit">Vaciar bitácora</button>
  </div>
</div>

    </main>
  </div>

  <script src="../js/app.js"></script>
  <script>
    requireAuth();
    setActiveNav("bitacoras");
    document.getElementById("whoami").textContent = "";
    document.getElementById("btnLogout").addEventListener("click", logout);
  </script>
  
<script>
  const tb = document.getElementById("tbBit");
  const q = document.getElementById("qBit");

  function render(){
    // Esqueleto: sin registros
    tb.innerHTML = "";
  }

  document.getElementById("btnClearBit").addEventListener("click", () => {
    // Esqueleto: no hacemos nada (ya está vacía)
    render();
  });

  q.addEventListener("input", render);
  render();
</script>

</body>
</html>
