<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Especialidades médicas</title>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <nav class="nav">
        <a href="./dashboard.html" data-nav="dashboard">Dashboard</a>
<a href="./pacientes.html" data-nav="pacientes">Control de pacientes</a>
<a href="./agenda.html" data-nav="agenda">Control de agenda</a>
<a href="./medicos.html" data-nav="medicos">Control de médicos</a>
<a href="./especialidades.html" data-nav="especialidades">Especialidades médicas</a>
<a href="./tarifas.html" data-nav="tarifas">Gestor de tarifas</a>
<a href="./pagos.html" data-nav="pagos">Pagos</a>
<a href="./reportes.html" data-nav="reportes">Reportes</a>
<a href="./bitacoras.html" data-nav="bitacoras">Bitácoras de usuarios</a>
      </nav>
      <div style="margin-top:12px;">
        <button class="btn" id="btnLogout">Cerrar sesión</button>
        <div class="small" id="whoami" style="margin-top:8px;"></div>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <h1>Especialidades médicas</h1>
      </div>

      
<div class="card">
  <div style="font-weight:700;margin-bottom:8px;">Agregar / Editar especialidad</div>
  <form id="frmEsp">
    <input type="hidden" id="e_id" />
    <div class="grid">
      <div class="field">
        <label>Nombre</label>
        <input id="e_nombre" required />
      </div>
      <div class="field">
        <label>Descripción</label>
        <input id="e_desc" />
      </div>
    </div>
    <div class="actions">
      <button class="btn primary" type="submit">Guardar</button>
      <button class="btn" type="button" id="e_limpiar">Limpiar</button>
    </div>
    <div class="small" id="e_msg"></div>
  </form>
</div>

<div class="card">
  <div style="font-weight:700;margin-bottom:8px;">Lista</div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Nombre</th><th>Descripción</th><th>Acciones</th></tr></thead>
      <tbody id="tbEsp">
        </tbody>
    </table>
  </div>
</div>

    </main>
  </div>

  <script src="../js/app.js"></script>
  <script>
    requireAuth();
    setActiveNav("especialidades");
    document.getElementById("whoami").textContent = "";
    document.getElementById("btnLogout").addEventListener("click", logout);
  </script>
  
<script>
  const $ = (id) => document.getElementById(id);
  const frm = $("frmEsp");
  const tb = $("tbEsp");
  const msg = $("e_msg");

  function limpiar() {
    $("e_id").value = "";
    frm.reset();
    msg.textContent = "";
  }

  function render() {
    const items = list(STORAGE.ESPECIALIDADES);
    tb.innerHTML = items.map(x => `
      <tr>
        <td>${x.nombre}</td>
        <td>${x.descripcion || ""}</td>
        <td>
          <button class="btn" onclick="editEsp('${x.id}')">Editar</button>
          <button class="btn danger" onclick="delEsp('${x.id}')">Eliminar</button>
        </td>
      </tr>
    `).join("") || `<tr><td colspan="3" class="small">Sin registros</td></tr>`;
  }

  window.editEsp = (id) => {
    const x = byId(list(STORAGE.ESPECIALIDADES), id);
    if (!x) return;
    $("e_id").value = x.id;
    $("e_nombre").value = x.nombre;
    $("e_desc").value = x.descripcion || "";
    msg.textContent = "Editando...";
  };

  window.delEsp = (id) => {
    if (!confirm("¿Eliminar especialidad?")) return;
    removeById(STORAGE.ESPECIALIDADES, id);
    logAction("Eliminó especialidad " + id, "Especialidades");
    render();
  };

  frm.addEventListener("submit", (e) => {
    e.preventDefault();
    const id = $("e_id").value || uid("e");
    const item = { id, nombre: $("e_nombre").value.trim(), descripcion: $("e_desc").value.trim() };
    upsert(STORAGE.ESPECIALIDADES, item);
    logAction((($("e_id").value) ? "Actualizó" : "Agregó") + " especialidad " + item.nombre, "Especialidades");
    msg.textContent = "Guardado";
    limpiar();
    render();
  });

  $("e_limpiar").addEventListener("click", limpiar);
  render();
</script>

</body>
</html>
