<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Clínica</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body class="login-page">
  <form id="loginForm">
    <img src="./img/usuario.png" alt="Usuario" />
    <label for="username">Usuario</label>
    <input type="text" id="username" placeholder="Escribe tu usuario" required />

    <label for="password">Contraseña</label>
    <input type="password" id="password" placeholder="Escribe tu contraseña" required />

    <div class="box-visible">
      <input type="checkbox" id="visible" />
      <label for="visible">Mostrar contraseña</label>
    </div>

    <button type="submit" id="submit">Iniciar sesión</button>
    <div class="helper-text">Demo: <b>admin</b> / <b>admin</b></div>
    <div class="helper-text" id="loginMsg"></div>
  </form>

  <script src="./js/app.js"></script>
  <script src="./js/login.js"></script>
</body>
</html>
